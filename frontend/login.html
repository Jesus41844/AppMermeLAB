<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso | AppMermeLAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-main: #f8fafc; /* Un slate suave para el fondo */
      }
      body {
        background-color: var(--bg-main);
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
      <!-- Card Principal -->
      <div
        class="bg-white rounded-3xl shadow-2xl shadow-emerald-100/50 border border-gray-100 overflow-hidden"
      >
        <div class="p-8">
          <!-- Logos -->
          <div class="flex justify-center items-center gap-6 mb-8">
            <img
              src="/static/images/logo_utp.png"
              alt="UTP"
              class="h-12 w-auto object-contain"
            />
            <div class="h-8 w-px bg-gray-200"></div>
            <img
              src="/static/images/logo_uvg.png"
              alt="UVG"
              class="h-12 w-auto object-contain"
            />
          </div>

          <!-- Título -->
          <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-gray-800">
              Acceso a AppMermeLAB
            </h1>
            <p class="text-sm text-gray-500 mt-2">
              Ingresa tus credenciales para continuar
            </p>
          </div>

          <!-- Contenedor de Error (Oculto por defecto) -->
          <div
            id="error-container"
            class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg flex items-center gap-3"
          >
            <i class="fas fa-exclamation-circle text-red-500"></i>
            <p id="error-text" class="text-sm text-red-700 font-medium"></p>
          </div>

          <!-- Formulario -->
          <form id="login-form" class="space-y-5">
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-400 mb-2 ml-1 tracking-wider"
                >Usuario</label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400"
                >
                  <i class="fas fa-user"></i>
                </span>
                <input
                  type="text"
                  name="username"
                  required
                  class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all"
                  placeholder="Nombre de usuario"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-400 mb-2 ml-1 tracking-wider"
                >Contraseña</label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400"
                >
                  <i class="fas fa-lock"></i>
                </span>
                <input
                  type="password"
                  name="password"
                  required
                  class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all"
                  placeholder="••••••••"
                />
              </div>
            </div>

            <button
              type="submit"
              id="submit-btn"
              class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200 active:scale-[0.98] flex justify-center items-center gap-2"
            >
              <span>Iniciar Sesión</span>
              <i class="fas fa-arrow-right text-xs opacity-70"></i>
            </button>
          </form>
        </div>

        <!-- Footer de la Card -->
        <div class="bg-gray-50 p-6 border-t border-gray-100 text-center">
          <p class="text-xs text-gray-400 font-medium">
            © 2026 AppMermeLAB - Sistema de Control de Producción
          </p>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("submit-btn");
          const errorContainer = document.getElementById("error-container");
          const errorText = document.getElementById("error-text");

          // Reset estado
          errorContainer.classList.add("hidden");
          btn.disabled = true;
          btn.innerHTML =
            '<i class="fas fa-circle-notch fa-spin"></i> Autenticando...';

          const formData = new FormData(e.target);
          const payload = Object.fromEntries(formData.entries());

          try {
            const response = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            const data = await response.json();

            if (response.ok) {
              localStorage.setItem("token", data.token || data.access_token);
              window.location.href = "/";
            } else {
              throw new Error(data.error || "Credenciales incorrectas");
            }
          } catch (err) {
            errorText.innerText = err.message;
            errorContainer.classList.remove("hidden");
            btn.disabled = false;
            btn.innerHTML =
              '<span>Iniciar Sesión</span><i class="fas fa-arrow-right text-xs opacity-70"></i>';
          }
        });
    </script>
  </body>
</html>
