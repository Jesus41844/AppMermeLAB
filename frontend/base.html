<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍓</text></svg>"
    />
    <title>{% block title %}AppMermeLAB{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    {% block custom_css %}{% endblock %}
  </head>
  <body class="bg-gray-50 text-gray-800 min-h-screen pt-16">
    <nav
      class="bg-white/95 backdrop-blur-md fixed top-0 left-0 right-0 w-full z-50 border-b border-slate-200/60 shadow-md h-16 flex items-center transition-all duration-300"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3 lg:gap-5">
            <a
              href="{{ url_for('views.index') }}"
              class="flex items-center space-x-3"
            >
              <div
                class="h-10 w-10 rounded-2xl bg-emerald-600 text-white flex items-center justify-center"
              >
                <i class="fas fa-flask"></i>
              </div>
              <span class="text-xl font-bold tracking-tight text-emerald-800 mr-1"
                >MermeLAB</span
              >
            </a>

            <div class="h-6 w-px bg-slate-200 mx-1 lg:mx-2"></div>

            <div class="flex items-center gap-3 lg:gap-4">
              <img
                src="{{ url_for('static', filename='static/images/logo_utp.png') }}"
                class="h-8 lg:h-10 w-auto object-contain opacity-80 transition-opacity hover:opacity-100"
                alt="UTP"
              />
              <img
                src="{{ url_for('static', filename='static/images/logo_fisc.png') }}"
                class="h-8 lg:h-10 w-auto object-contain opacity-80 transition-opacity hover:opacity-100"
                alt="FISC"
              />
              <img
                src="{{ url_for('static', filename='static/images/logo_uvg.png') }}"
                class="h-6 lg:h-8 w-auto object-contain opacity-80 transition-opacity hover:opacity-100"
                alt="UVG"
              />
            </div>
          </div>

          <!-- Enlaces de Navegación -->
          <div class="flex space-x-1 items-center">
            <a
              href="{{ url_for('views.index') }}"
              id="nav-inicio"
              class="nav-link"
              >Inicio</a
            >
            <a
              href="{{ url_for('views.recetas') }}"
              id="nav-recetas"
              class="nav-link"
              >Recetas</a
            >
            <a
              href="{{ url_for('views.produccion') }}"
              id="nav-produccion"
              class="nav-link"
              >Producción</a
            >
            <a
              href="{{ url_for('views.inventario') }}"
              id="nav-inventario"
              class="nav-link"
              >Inventario</a
            >
            <a
              href="{{ url_for('views.residuos') }}"
              id="nav-residuos"
              class="nav-link"
              >Residuos</a
            >
            <a
              href="{{ url_for('views.ventas') }}"
              id="nav-ventas"
              class="nav-link"
              >Ventas</a
            >
          </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </main>

    <div
      id="global-loader"
      class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center"
    >
      <div
        class="w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"
      ></div>
      <p class="mt-4 text-emerald-800 font-medium">Procesando datos...</p>
    </div>

    <script
      type="module"
      src="{{ url_for('static', filename='js/app.js') }}"
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Lógica de activación de links mejorada
        const path = window.location.pathname;
        let pageKey = "inicio";

        if (path.includes("recetas")) pageKey = "recetas";
        else if (path.includes("produccion")) pageKey = "produccion";
        else if (path.includes("inventario")) pageKey = "inventario";
        else if (path.includes("residuos")) pageKey = "residuos";
        else if (path.includes("ventas")) pageKey = "ventas";

        const desktopLink = document.getElementById(`nav-${pageKey}`);
        if (desktopLink) {
          desktopLink.classList.add("active-link");
        }
      });
    </script>
    {% block custom_js %}{% endblock %}
  </body>
</html>
