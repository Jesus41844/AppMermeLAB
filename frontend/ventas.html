{% extends 'base.html' %} {% block title %}Ventas | MermeLAB{% endblock %} {%
block content %}
<div class="max-w-3xl mx-auto px-4 py-12">
  <div class="grid grid-cols-1 gap-12 justify-items-center">
    <!-- Formulario de Venta -->
    <div
      class="w-full bg-white p-8 rounded-3xl shadow-sm border border-gray-100"
    >
      <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
        <i class="fas fa-flask text-amber-500"></i>
        Registrar Salida
      </h2>
      <form id="venta-form" class="space-y-6">
        <div>
          <label
            class="block text-xs font-semibold uppercase text-gray-500 mb-2"
          >
            Seleccionar Lote de Producto
          </label>
          <select
            id="id_produccion"
            required
            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500"
          ></select>
          <p id="ventas-error-msg" class="hidden mt-2 text-sm text-red-600"></p>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-xs font-semibold uppercase text-gray-500 mb-2"
            >
              Cantidad (Frascos)
            </label>
            <input
              type="number"
              id="cantidad"
              required
              class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500"
            />
          </div>
          <div>
            <label
              class="block text-xs font-semibold uppercase text-gray-500 mb-2"
            >
              Precio Total
            </label>
            <input
              type="number"
              id="precio_total"
              step="0.01"
              placeholder="$0.00"
              class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500"
            />
          </div>
        </div>
        <button
          type="submit"
          class="w-full bg-amber-500 text-white py-4 rounded-3xl font-bold shadow-lg hover:bg-amber-600 transition-all"
        >
          Confirmar Venta y Salida de Stock
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %} {% block custom_js %}
<script type="module">
  import { API_BASE } from "{{ url_for('static', filename='js/app.js') }}";

  function showError(message) {
    const errorEl = document.getElementById("ventas-error-msg");
    if (!errorEl) return;
    errorEl.textContent = message || "";
    errorEl.classList.toggle("hidden", !message);
  }

  async function loadLotes() {
    const res = await fetch(`${API_BASE}/api/lotes`);
    const lotes = await res.json();
    const select = document.getElementById("id_produccion");
    const lotesCompletos = lotes.filter(
      (l) => l.estado === "completado" && l.stock_frascos > 0,
    );

    if (lotesCompletos.length === 0) {
      select.innerHTML =
        '<option value="">No hay lotes completados y con stock disponibles</option>';
      select.disabled = true;
      showError(
        "Solo se pueden vender lotes completados con stock disponible. Completa un lote antes de registrar una venta.",
      );
      return;
    }

    select.disabled = false;
    showError(null);
    select.innerHTML = lotesCompletos
      .map(
        (l) =>
          `<option value="${l.id}">${l.receta} - Lote: ${l.id} (${l.stock_frascos} frascos disponibles)</option>`,
      )
      .join("");
  }

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("venta-form");
    if (!form) return;

    form.onsubmit = async (e) => {
      e.preventDefault();
      showError(null);

      const idProduccion = Number(
        document.getElementById("id_produccion").value,
      );
      const cantidad = Number(document.getElementById("cantidad").value);
      const precioTotal = Number(document.getElementById("precio_total").value);

      if (
        !idProduccion ||
        cantidad <= 0 ||
        Number.isNaN(precioTotal) ||
        precioTotal < 0
      ) {
        showError(
          "Revisa los datos: cantidad debe ser mayor que 0 y el precio no puede ser negativo.",
        );
        return;
      }

      const payload = {
        id_produccion: idProduccion,
        cantidad,
        precio_total: precioTotal,
      };

      const res = await fetch(`${API_BASE}/api/sales`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (res.ok) {
        alert("Venta registrada y stock actualizado");
        location.reload();
      } else {
        const err = await res.json();
        showError(err.error || "Error al procesar la venta");
      }
    };

    loadLotes();
  });
</script>
{% endblock %}
